spring:
  profiles:
    active: dev

  application:
    name: portfolio-api

  # Jackson: null field'ları response'a dahil etme
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # JPA
  jpa:
    open-in-view: false   # Lazy loading sorunlarını gizlememesi için kapalı
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # File upload limitleri
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

# API
server:
  port: 8080
  servlet:
    context-path: /

# Swagger UI — sadece dev'de açık olacak
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Uygulama bazlı config
resend:
  api-key: ${RESEND_API_KEY:not-configured}

app:
  storage:
    type: local                             # local | s3 (Phase 2)
    local:
      upload-dir: uploads                   # proje root'una göre relatif
      # Prod: APP_STORAGE_BASE_URL=https://your-railway-app.railway.app/files
      base-url: ${APP_STORAGE_BASE_URL:http://localhost:8080/files}
  api:
    version: v1
    base-path: /api/v1
  jwt:
    # Zorunlu — env variable set edilmeden uygulama başlamaz.
    # Minimum 32 karakter (256-bit) olmalı — HS256 için.
    # Örnek üretim: openssl rand -base64 48
    secret: ${APP_JWT_SECRET}
    expiration-ms: 86400000   # 24 saat (ms)
  admin:
    # Zorunlu — env variable set edilmeden uygulama başlamaz.
    # APP_ADMIN_EMAIL ve APP_ADMIN_PASSWORD env variable'larını set et.
    initial-email: ${APP_ADMIN_EMAIL}
    initial-password: ${APP_ADMIN_PASSWORD}
  notification:
    # Contact form bildirimleri bu adreslere gönderilir (virgülle ayrılmış)
    recipients: devrimbenzer@gmail.com
  cors:
    # Dev: virgülle ayrılmış localhost adresler
    # Prod: CORS_ALLOWED_ORIGINS env var'ı set et (örn: https://elifbenzer.com,https://www.elifbenzer.com)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

---
# DEV profili
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: portfolio_user
    password: portfolio_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate   # Flyway yönetiyor, Hibernate sadece doğrular

  # Gmail SMTP — dev'de test için
  # MAIL_USERNAME : Gmail adresiniz (gönderen)
  # MAIL_APP_PASSWORD : Gmail → Güvenlik → Uygulama Şifresi
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    com.portfolio: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

---
# PROD profili
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# Swagger prod'da kapalı
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.portfolio: INFO
    root: WARN